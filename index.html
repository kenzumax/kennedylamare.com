<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kennedy Lamare</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      color: #fff;
      font-family: 
        -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
      padding: 2rem 1.5rem;
      max-width: 720px;
      width: 100%;
    }

    /* Logo icon */
    .logo {
      margin-bottom: 2rem;
    }
    .logo svg {
      width: 48px;
      height: 48px;
      opacity: 0.85;
    }

    /* Headline */
    h1 {
      font-size: clamp(2.4rem, 7vw, 5rem);
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -0.03em;
      margin-bottom: 1.8rem;
    }

    /* Social links */
    .socials {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
      justify-content: center;
      margin-bottom: 2.2rem;
    }

    .socials a {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      background: #1a1a1a;
      border: 1px solid #2e2e2e;
      color: #fff;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      padding: 0.45rem 1rem;
      border-radius: 999px;
      transition: background 0.2s;
    }
    .socials a:hover { background: #2a2a2a; }

    .socials a svg { width: 18px; height: 18px; flex-shrink: 0; }

    /* Subtext */
    .subtext {
      font-size: 1.05rem;
      color: #aaa;
      line-height: 1.6;
      max-width: 520px;
      margin: 0 auto 2.2rem;
    }

    /* Email signup */
    .signup {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 3rem;
    }

    .signup input {
      background: #1a1a1a;
      border: 1px solid #2e2e2e;
      color: #fff;
      font-size: 1rem;
      padding: 0.75rem 1.2rem;
      border-radius: 10px;
      outline: none;
      width: 260px;
      transition: border-color 0.2s;
    }
    .signup input::placeholder { color: #555; }
    .signup input:focus { border-color: #555; }

    .signup button {
      background: #fff;
      color: #000;
      font-size: 1rem;
      font-weight: 600;
      padding: 0.75rem 1.4rem;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .signup button:hover { opacity: 0.85; }

    /* Footer */
    footer {
      font-size: 0.8rem;
      color: #444;
    }
  </style>
</head>
